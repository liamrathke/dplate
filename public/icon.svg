<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="iconClip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
    <!-- Light teal blue plate background -->
    <rect width="512" height="512" fill="#5bb8d4"/>

    <!-- Red banner curving upward -->
    <path d="M0 0 L512 0 L512 140 Q256 90 0 140 Z" fill="#c41e3a"/>

    <!-- Main plate number: moved up to be more centered in teal area -->
    <text x="256" y="318" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="180" font-weight="900" fill="#1a1a1a">0001</text>

    <!-- DPlate label centered between top screws -->
    <text x="256" y="64" text-anchor="middle" dominant-baseline="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" letter-spacing="2" fill="#ffffff">DPlate</text>

    <!-- Top-left screw (in red area) -->
    <circle cx="60" cy="60" r="14" fill="#8b2025" stroke="#721a1e" stroke-width="2"/>
    <circle cx="60" cy="60" r="5" fill="#5a1015"/>
    <!-- Top-right screw (in red area) -->
    <circle cx="452" cy="60" r="14" fill="#8b2025" stroke="#721a1e" stroke-width="2"/>
    <circle cx="452" cy="60" r="5" fill="#5a1015"/>
    <!-- Bottom-left screw (in teal area) -->
    <circle cx="60" cy="452" r="14" fill="#3a8daa" stroke="#2e7a95" stroke-width="2"/>
    <circle cx="60" cy="452" r="5" fill="#1e5f7a"/>
    <!-- Bottom-right screw (in teal area) -->
    <circle cx="452" cy="452" r="14" fill="#3a8daa" stroke="#2e7a95" stroke-width="2"/>
    <circle cx="452" cy="452" r="5" fill="#1e5f7a"/>
  </g>
</svg>
